name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || '8228356997:AAGUgyxDDopNrt73wBxnolJjfYjkdVCg6-E' }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || '5037250569' }}

      - name: Sync Capacitor
        run: |
          # Ensure android platform is added
          if [ ! -d "android" ]; then
            echo "Android platform not found, adding it..."
            npx cap add android
          fi
          
          # Sync web assets to android
          npx cap sync android
          
          # Try to generate assets if icon.png exists
          ICON_PATH=$(find . -name "icon.png" | head -n 1)
          if [ -n "$ICON_PATH" ]; then
            echo "Found icon at $ICON_PATH, generating assets..."
            npm install -g @capacitor/assets
            # Delete default icons to force replacement
            rm -rf android/app/src/main/res/mipmap-*
            # Generate new icons
            capacitor-assets generate --android --icon "$ICON_PATH"
          else
            echo "WARNING: icon.png not found. Using default Capacitor icons."
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: qlf-barber-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
