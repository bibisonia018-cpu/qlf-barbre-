name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          # Debug: List files to see where icon.png is
          echo "Listing files in root:"
          ls -R . | grep -v "node_modules" | head -n 50

      - name: Build Web App
        run: npm run build
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || '8228356997:AAGUgyxDDopNrt73wBxnolJjfYjkdVCg6-E' }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || '5037250569' }}

      - name: Sync Capacitor
        run: |
          # Ensure android platform is added
          if [ ! -d "android" ]; then
            echo "Android platform not found, adding it..."
            npx cap add android
          fi
          
          # Sync web assets to android
          echo "Syncing web assets to android..."
          npx cap sync android
          
          # Try to generate assets if icon.png exists
          if [ -f "icon.png" ]; then
            echo "Found icon.png, generating assets..."
            npx @capacitor/assets generate --android --icon icon.png
          elif [ -f "src/icon.png" ]; then
            echo "Found src/icon.png, generating assets..."
            npx @capacitor/assets generate --android --icon src/icon.png
          else
            echo "WARNING: icon.png not found. Using default icons."
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: qlf-barber-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
